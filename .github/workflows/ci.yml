# ── Continuous integration ────────────────────────────────────────────
#
# Runs on every push to main and every PR — keeps the build green
# and prevents the kind of editor-crash regression we shipped during
# the Notes premium polish work (TDZ at mount, stale-closure on
# rapid type-after-delete). Three parallel jobs:
#
#   • lint   — eslint
#   • unit   — vitest (~6s wall, 715 tests)
#   • e2e    — playwright smoke (~15-25s wall: build + chromium boot
#              + the spec). Build step is implicit in webServer.
#
# Vercel's auto-deploy on push is INDEPENDENT of these checks today
# (no "Ignored Build Step" gate wired). If CI starts catching real
# regressions, the next move is to add a check-status gate in
# Vercel's project settings so a red main never ships.
#
# Caching:
#   • npm cache via actions/setup-node's built-in `cache: 'npm'`
#   • Playwright browser binaries via actions/cache keyed on the
#     pinned playwright version (subsequent runs ~10s vs ~45s cold)

name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel older in-flight runs when a fresh commit lands on the same
# ref. A solo dev push-loop shouldn't burn three concurrent Actions
# bills for runs that are already stale.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --no-audit --no-fund
      - run: npm run lint

  typecheck:
    name: Typecheck (tsc)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --no-audit --no-fund
      - run: npm run typecheck

  bundle:
    name: Bundle size budget (size-limit)
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Node 22 (not 20): this job runs the full `npm run build`, whose
          # `prebuild` invokes `node --experimental-strip-types` to load the
          # TS privacy source — a flag that only exists on Node ≥22.6.
          node-version: "22"
          cache: "npm"
      - run: npm ci --no-audit --no-fund
      # Build, then check the emitted chunks against the brotli budgets in
      # .size-limit.json. Fails the job (and, via the deploy gate's `needs`,
      # blocks production) when a chunk silently bloats past its limit — the
      # manual-chunk discipline in vite.config.js is now enforced, not hoped.
      - run: npm run build
      - run: npm run size

  unit:
    name: Unit tests (vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --no-audit --no-fund
      # Runs the full unit suite WITH the coverage ratchet (test:coverage is
      # `vitest run --coverage`, so it subsumes a plain `npm test`). The gate
      # holds the financial kernel (accounting.ts — the canonical amountDue
      # formula) at 100% + its branch floor, and (WS-10) its integrity
      # neighbors — recurrence/backfill, the optimistic-revert primitive,
      # opening balance, the patient-edit + new-patient payload builders,
      # slot finding + conflict detection — at their measured floor. Fails if
      # a new branch in any of them ships without a test, per CLAUDE.md's
      # prime-directive rule.
      - run: npm run test:coverage

  # JS ↔ SQL accounting-predicate parity. Protects the Prime Directive:
  # the in-app/audit JS predicate and the trigger's SQL predicate MUST
  # agree or users see one balance and the DB stores another. Runs the
  # real SQL function via the Supabase Management API with synthetic
  # inputs (no patient data read). The test self-skips when the secrets
  # are absent (forks / outside PRs), so this job is a no-op there.
  parity:
    name: Accounting predicate parity (JS↔SQL)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --no-audit --no-fund
      - run: npm run test:parity
        env:
          SUPABASE_PAT: ${{ secrets.SUPABASE_PAT }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

  e2e:
    name: E2E smoke (playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --no-audit --no-fund

      # Pin the Playwright version into the cache key so a bump to
      # @playwright/test invalidates the browser cache automatically
      # — Playwright requires browser version match SDK.
      - name: Resolve Playwright version
        id: pw
        run: echo "version=$(node -p "require('./package.json').devDependencies['@playwright/test'].replace(/^[^\d]*/, '')")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ steps.pw.outputs.version }}

      - name: Install Playwright Chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      # System deps may still be missing on a cache hit; cheap to
      # idempotently ensure them.
      - name: Install Playwright system deps (cache-hit path)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run smoke test
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  # Real-auth money-write E2E against the dedicated STAGING Supabase
  # project (WS-0 / WS-5b). Signs in as a seeded user and exercises the
  # actual write path (record payment → balance, delete → revert) through
  # real RLS + the counter triggers — coverage the hermetic demo smoke
  # can't give. A guard step no-ops the whole job when the staging
  # secrets are absent (forks / outside PRs), so it never fails for want
  # of access. Single worker; the spec also self-skips on missing creds.
  e2e-staging:
    name: E2E money-write (staging, real auth)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Check staging secrets
        id: guard
        env:
          URL: ${{ secrets.STAGING_SUPABASE_URL }}
        run: |
          if [ -n "$URL" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Staging secrets absent — skipping the real-auth money-write E2E."
          fi

      - if: steps.guard.outputs.ready == 'true'
        run: npm ci --no-audit --no-fund

      - name: Resolve Playwright version
        if: steps.guard.outputs.ready == 'true'
        id: pw
        run: echo "version=$(node -p "require('./package.json').devDependencies['@playwright/test'].replace(/^[^\d]*/, '')")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        if: steps.guard.outputs.ready == 'true'
        uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ steps.pw.outputs.version }}

      - name: Install Playwright Chromium
        if: steps.guard.outputs.ready == 'true' && steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cache-hit path)
        if: steps.guard.outputs.ready == 'true' && steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      # The staging build needs the public URL + anon at build time; the
      # spec + seed need the service role + test creds at run time.
      - name: Write staging build env
        if: steps.guard.outputs.ready == 'true'
        env:
          STAGING_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          STAGING_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
        run: |
          {
            echo "VITE_SUPABASE_URL=${STAGING_SUPABASE_URL}"
            echo "VITE_SUPABASE_ANON_KEY=${STAGING_SUPABASE_ANON_KEY}"
            echo "VITE_VAPID_PUBLIC_KEY="
            echo "VITE_NOTES_RECOVERY_PUBLIC_KEY="
            echo "VITE_WHATSAPP_UI_ENABLED="
          } > .env.e2e-staging

      - name: Seed the staging test account
        if: steps.guard.outputs.ready == 'true'
        env:
          STAGING_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          STAGING_SERVICE_ROLE: ${{ secrets.STAGING_SERVICE_ROLE }}
          E2E_USER_EMAIL: ${{ secrets.STAGING_TEST_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.STAGING_TEST_USER_PASSWORD }}
        run: node scripts/seed-e2e-staging.mjs

      - name: Run money-write spec
        if: steps.guard.outputs.ready == 'true'
        env:
          E2E_USER_EMAIL: ${{ secrets.STAGING_TEST_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.STAGING_TEST_USER_PASSWORD }}
          # The spec's setup/teardown signs in (RLS-scoped) to reset the
          # seeded patient between runs — needs the public URL + anon too.
          STAGING_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          STAGING_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
        run: npm run test:e2e:staging

      - name: Upload Playwright report on failure
        if: failure() && steps.guard.outputs.ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-staging
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  # ── Gated production deploy (WS-1) ──────────────────────────────────
  #
  # The whole point: a RED main must never reach cardigan.mx. Vercel used
  # to auto-deploy every push to main INDEPENDENTLY of the checks above.
  # Now Vercel's own git auto-deploy is turned OFF (see docs/deploy-gating.md),
  # so the ONLY path to production is this job: it fires a Vercel Deploy
  # Hook, but only on a push to main AND only after every quality gate
  # below is green. A failed parity / money-write E2E / type error / lint /
  # bundle-bloat therefore cannot ship.
  #
  # Why a deploy hook instead of `vercel deploy` + a token: the automation
  # environment that set this up can't reach GitHub's API to store an
  # Actions secret (the org hasn't connected the Claude GitHub App), so the
  # credential is kept on the Vercel side instead. The hook URL is a
  # capability URL — it only redeploys main's current HEAD (no code
  # injection, no secret), so it's safe in-repo for this private repo.
  # Rotate it via Vercel → Settings → Git → Deploy Hooks (or the API) if it
  # ever leaks; update the URL here to match.
  deploy-production:
    name: Deploy production (gated on green CI)
    needs: [lint, typecheck, bundle, unit, parity, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger Vercel production deploy (only reached when all gates pass)
        run: |
          curl -fsS -X POST \
            "https://api.vercel.com/v1/integrations/deploy/prj_b7BGSTkTKwLT1aeKPEiKxAlz9Nmk/0Dyql4GmKV"
