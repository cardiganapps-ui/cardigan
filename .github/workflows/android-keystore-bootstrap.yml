# One-time helper: generate the Cardigan Android upload keystore in CI.
#
# WHY THIS EXISTS — the upload key must be created with `keytool`, which
# isn't available on an iPhone (and is awkward on Android). This lets you
# mint the key from your phone using only the GitHub web UI / app, then
# copy the resulting values into repo secrets. Equivalent to running
# scripts/android-keystore.sh on a computer.
#
# RUN IT ONCE. After the secrets are set and you've done your first Play
# upload, you never need this again.
#
# ─── SECURITY ────────────────────────────────────────────────────────
# The generated keystore + its passwords are uploaded as a workflow
# ARTIFACT so you can copy them into secrets. Anyone with read access to
# this repo can download that artifact while it exists. Mitigations:
#   • retention is 1 day,
#   • passwords are auto-generated and masked in the logs,
#   • you should DELETE the artifact from the run page as soon as you've
#     saved the values into Settings → Secrets (and into your own backup).
# The repo is private, so exposure is limited to collaborators — but treat
# the downloaded files like the production key they are. BACK UP the
# keystore somewhere durable: losing it means a 1–2 day Google key-reset
# appeal; updates can't ship without it.
# ─────────────────────────────────────────────────────────────────────

name: Android Keystore Bootstrap (one-time)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "generate" to confirm you want a NEW upload keystore'
        required: true
        default: ''

concurrency:
  group: android-keystore-bootstrap
  cancel-in-progress: false

jobs:
  generate:
    name: Generate upload keystore
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Guard on confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "generate" ]; then
            echo "::error::Type 'generate' in the confirm box to run this. Aborting."
            exit 1
          fi

      - name: Setup Java (for keytool)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Generate keystore + passwords
        run: |
          set -euo pipefail
          OUT="$RUNNER_TEMP/cardigan-android-keystore"
          mkdir -p "$OUT"

          ALIAS="cardigan-upload"
          STORE_PW="$(openssl rand -base64 24)"
          KEY_PW="$STORE_PW"   # one password for store + key keeps gradle simple

          # Mask the secrets so they never appear in the build log.
          echo "::add-mask::$STORE_PW"
          echo "::add-mask::$KEY_PW"

          keytool -genkeypair -v \
            -keystore "$OUT/cardigan-upload.keystore" \
            -storepass "$STORE_PW" \
            -keypass "$KEY_PW" \
            -alias "$ALIAS" \
            -keyalg RSA -keysize 2048 -validity 36500 \
            -dname "CN=Cardigan, OU=Apps, O=Cardigan, L=Ciudad de Mexico, ST=CDMX, C=MX"

          # base64 of the keystore → this is the ANDROID_KEYSTORE_BASE64 secret.
          base64 -w0 "$OUT/cardigan-upload.keystore" > "$OUT/ANDROID_KEYSTORE_BASE64.txt"

          # Human-readable bundle of every value to paste into secrets.
          cat > "$OUT/SECRETS-to-add.txt" <<EOF
          Add these at: Settings → Secrets and variables → Actions → New repository secret

          ANDROID_KEYSTORE_BASE64   → (contents of ANDROID_KEYSTORE_BASE64.txt in this bundle)
          ANDROID_KEYSTORE_PASSWORD → $STORE_PW
          ANDROID_KEY_ALIAS         → $ALIAS
          ANDROID_KEY_PASSWORD      → $KEY_PW

          Also keep cardigan-upload.keystore itself in a durable backup
          (password manager / encrypted storage). Losing it = 1-2 day
          Google key-reset appeal.
          EOF

          # Print fingerprints to the job summary (handy later, and not secret).
          {
            echo "## Keystore generated ✅"
            echo ""
            echo "Download the **cardigan-android-keystore** artifact below, then add the four secrets listed in \`SECRETS-to-add.txt\`."
            echo ""
            echo "**Then DELETE this run's artifact.**"
            echo ""
            echo '### Upload-key fingerprints (not secret)'
            echo '```'
            keytool -list -v \
              -keystore "$OUT/cardigan-upload.keystore" \
              -storepass "$STORE_PW" -alias "$ALIAS" | grep -E 'SHA1:|SHA256:' || true
            echo '```'
            echo "_Note: the **Play App Signing** fingerprint you paste into assetlinks.json later comes from the Play Console after your first upload — it differs from this upload-key fingerprint._"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload keystore bundle (DELETE after copying to secrets)
        uses: actions/upload-artifact@v4
        with:
          name: cardigan-android-keystore
          path: ${{ runner.temp }}/cardigan-android-keystore
          retention-days: 1
