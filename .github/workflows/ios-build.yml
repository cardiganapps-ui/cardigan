# Cardigan iOS → TestFlight pipeline.
#
# Runs on push to main (and manual dispatch). Builds the web bundle,
# generates a fresh ios/ scaffold with Capacitor, layers our custom
# entitlements + Privacy Manifest on top, archives + exports via
# xcodebuild, and uploads to TestFlight via the App Store Connect API.
#
# The ios/ directory is NEVER committed — it's generated fresh each
# run. This keeps the repo platform-clean (no Mac-specific Podfile.lock
# in git) and avoids drift between what you see locally and what CI
# builds.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#
#   APPLE_TEAM_ID                     — 10-char Apple Team ID
#   APP_STORE_CONNECT_API_KEY_ID      — 10-char key id (from App Store Connect)
#   APP_STORE_CONNECT_API_KEY_ISSUER  — UUID of the issuing team
#   APP_STORE_CONNECT_API_KEY_BASE64  — base64-encoded .p8 file contents
#
#   VITE_SUPABASE_URL                 — same value as production web
#   VITE_SUPABASE_ANON_KEY            — same
#   VITE_VAPID_PUBLIC_KEY             — same (used for web push; unused on iOS
#                                       but read at boot, so non-empty)
#   VITE_NOTES_RECOVERY_PUBLIC_KEY    — same
#   VITE_SENTRY_DSN                   — same
#   VITE_TURNSTILE_SITE_KEY           — same
#   VITE_STRIPE_PUBLISHABLE_KEY       — same
#   VITE_STRIPE_PRICE_ID              — same
#   VITE_STRIPE_PRICE_ID_ANNUAL       — same
#
# Until every required secret is present, the workflow exits early
# with a clear "missing secret X" message rather than failing partway.

name: iOS Build & TestFlight

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'android/**'
      - 'scripts/**'
      - '.github/**'
      - '!.github/workflows/ios-build.yml'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why are you triggering manually? (logged in run name)'
        required: false
        default: 'manual'

concurrency:
  # One iOS build at a time. Pushes during a build cancel the older.
  group: ios-build
  cancel-in-progress: true

jobs:
  build:
    name: Archive + upload to TestFlight
    # macos-26 ships with Xcode 26 (iOS 26 SDK). Apple's App Store
    # rejected the iOS 18.5 SDK artifacts produced by macos-15 in
    # June 2026 with "all iOS apps must be built with the iOS 26
    # SDK or later". Pin explicitly rather than relying on
    # macos-latest's image-rollout cadence.
    runs-on: macos-26
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify secrets present
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ASC_ISSUER: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER }}
          ASC_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          missing=()
          [ -z "$APPLE_TEAM_ID" ] && missing+=("APPLE_TEAM_ID")
          [ -z "$ASC_KEY_ID" ]    && missing+=("APP_STORE_CONNECT_API_KEY_ID")
          [ -z "$ASC_ISSUER" ]    && missing+=("APP_STORE_CONNECT_API_KEY_ISSUER")
          [ -z "$ASC_KEY" ]       && missing+=("APP_STORE_CONNECT_API_KEY_BASE64")
          [ -z "$SUPABASE_URL" ]  && missing+=("VITE_SUPABASE_URL")
          [ -z "$SUPABASE_KEY" ]  && missing+=("VITE_SUPABASE_ANON_KEY")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            echo "Add them at Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web bundle
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY }}
          VITE_NOTES_RECOVERY_PUBLIC_KEY: ${{ secrets.VITE_NOTES_RECOVERY_PUBLIC_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_TURNSTILE_SITE_KEY: ${{ secrets.VITE_TURNSTILE_SITE_KEY }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}
          VITE_STRIPE_PRICE_ID: ${{ secrets.VITE_STRIPE_PRICE_ID }}
          VITE_STRIPE_PRICE_ID_ANNUAL: ${{ secrets.VITE_STRIPE_PRICE_ID_ANNUAL }}
          VITE_WHATSAPP_UI_ENABLED: ${{ vars.VITE_WHATSAPP_UI_ENABLED }}
        run: npm run build

      - name: Generate iOS project (cap add ios + sync)
        run: |
          npx cap add ios
          npx cap sync ios

      - name: Generate app icons + splash from assets/
        # @capacitor/assets reads assets/icon.png (1024×1024) and
        # assets/splash.png (2732×2732), writes every iOS variant into
        # ios/App/App/Assets.xcassets/. Without this, every TestFlight
        # build ships Capacitor's placeholder blue-X icon.
        # --splashBackgroundColor pins the LaunchScreen storyboard's
        # surrounding canvas to the exact Cardigan teal so the seam
        # between the scaleAspectFit splash image and the surrounding
        # storyboard background disappears (matches the splash plugin
        # backgroundColor configured in capacitor.config.json).
        run: npx @capacitor/assets generate --ios --splashBackgroundColor "#5B9BAF" --splashBackgroundColorDark "#5B9BAF"

      - name: Layer entitlements + Privacy Manifest
        run: bash scripts/apply-ios-config.sh

      # Capacitor 8 ships with Swift Package Manager by default — no
      # Podfile, no xcworkspace. xcodebuild resolves SPM deps itself
      # at -project parse time, so no separate install step is needed.

      - name: Decode App Store Connect API key
        env:
          ASC_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        run: |
          mkdir -p ~/private_keys
          echo "$ASC_KEY_BASE64" | base64 --decode > "$HOME/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          chmod 600 "$HOME/private_keys/AuthKey_${ASC_KEY_ID}.p8"

      # Manual signing setup — the App Store Connect API key we have is
      # App-Manager-scoped, so xcodebuild's -allowProvisioningUpdates with
      # Automatic signing only created Development certs (and Development
      # profiles need registered devices we don't have). We pre-created a
      # Distribution cert + App Store provisioning profile via the API
      # and stashed them as repo secrets — this step installs them into a
      # temporary keychain so xcodebuild can sign with them directly.
      - name: Install distribution certificate + provisioning profile
        env:
          P12_BASE64: ${{ secrets.BUILD_CERTIFICATE_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.BUILD_CERTIFICATE_P12_PASSWORD }}
          PROFILE_BASE64: ${{ secrets.BUILD_PROVISIONING_PROFILE_BASE64 }}
        run: |
          # Decode artifacts
          CERT_PATH="$RUNNER_TEMP/build_certificate.p12"
          PROFILE_PATH="$RUNNER_TEMP/build.mobileprovision"
          echo "$P12_BASE64" | base64 --decode > "$CERT_PATH"
          echo "$PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          # Create + unlock a temporary keychain. Default-keychain switch
          # so codesign reaches into it without needing extra flags.
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PW=$(openssl rand -base64 24)
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN_PATH"

          # Import the P12; -A lets any app on the runner read the key
          # (codesign + xcodebuild). Authorize partition access so
          # codesign doesn't prompt for the keychain password.
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PW" "$KEYCHAIN_PATH"

          # Put the build keychain first in the search list so codesign
          # finds the cert without scanning the login keychain.
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychain -d user | tr -d '"')

          # Install the provisioning profile under the UUID Xcode expects.
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          UUID=$(security cms -D -i "$PROFILE_PATH" | plutil -extract UUID raw -)
          cp "$PROFILE_PATH" "$PROFILES_DIR/$UUID.mobileprovision"
          echo "✓ installed profile UUID=$UUID"

          # Confirm the identity is visible to codesign.
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Archive
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd ios/App
          # Manual signing — the cert is in the temp keychain, the profile
          # is installed under ~/Library/MobileDevice/Provisioning Profiles.
          # No -allowProvisioningUpdates needed; both artifacts already
          # exist. The named specifier matches the profile we created via
          # the App Store Connect API (name = "Cardigan App Store").
          # CURRENT_PROJECT_VERSION (build number) must monotonically
          # increase per TestFlight upload — Apple rejects duplicates
          # with ENTITY_ERROR.ATTRIBUTE.INVALID.DUPLICATE. github.run_number
          # is the natural source of truth: monotonically increasing per
          # workflow, easy to trace back to a specific run.
          xcodebuild -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -destination "generic/platform=iOS" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="Cardigan App Store" \
            CODE_SIGN_ENTITLEMENTS=App/App.entitlements \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            archive

      - name: Export IPA
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd ios/App
          # Render the export options inline so we can stitch in the team
          # id + profile mapping that manual signing requires.
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store-connect</string>
            <key>signingStyle</key><string>manual</string>
            <key>teamID</key><string>$APPLE_TEAM_ID</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>mx.cardigan.app</key><string>Cardigan App Store</string>
            </dict>
            <key>uploadSymbols</key><true/>
            <key>stripSwiftSymbols</key><true/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -exportPath "$RUNNER_TEMP/ipa" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

      - name: Upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ASC_ISSUER: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER }}
        run: |
          IPA=$(ls "$RUNNER_TEMP"/ipa/*.ipa | head -1)
          echo "Uploading $IPA to TestFlight..."
          xcrun altool --upload-app \
            -f "$IPA" \
            -t ios \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER"

      - name: Clean up API key
        if: always()
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        run: rm -f "$HOME/private_keys/AuthKey_${ASC_KEY_ID}.p8"
