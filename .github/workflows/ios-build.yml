# Cardigan iOS → TestFlight pipeline.
#
# Runs on push to main (and manual dispatch). Builds the web bundle,
# generates a fresh ios/ scaffold with Capacitor, layers our custom
# entitlements + Privacy Manifest on top, archives + exports via
# xcodebuild, and uploads to TestFlight via the App Store Connect API.
#
# The ios/ directory is NEVER committed — it's generated fresh each
# run. This keeps the repo platform-clean (no Mac-specific Podfile.lock
# in git) and avoids drift between what you see locally and what CI
# builds.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#
#   APPLE_TEAM_ID                     — 10-char Apple Team ID
#   APP_STORE_CONNECT_API_KEY_ID      — 10-char key id (from App Store Connect)
#   APP_STORE_CONNECT_API_KEY_ISSUER  — UUID of the issuing team
#   APP_STORE_CONNECT_API_KEY_BASE64  — base64-encoded .p8 file contents
#
#   BUILD_CERTIFICATE_P12_BASE64      — Apple Distribution cert (.p12, base64)
#   BUILD_CERTIFICATE_P12_PASSWORD    — its password
#
# Provisioning profiles are NOT secrets: the build fetches the CURRENT
# "Cardigan App Store" + "Cardigan Widgets App Store" profiles from the
# App Store Connect API at build time (scripts/fetch-asc-profiles.mjs,
# authenticated with the same ASC key used for the TestFlight upload).
# Regenerating a profile in the portal/API is enough — no secret to
# re-encode. (The old BUILD_PROVISIONING_PROFILE_BASE64 secret is
# unused as of the widgets rollout and can be deleted.)
#
#   VITE_SUPABASE_URL                 — same value as production web
#   VITE_SUPABASE_ANON_KEY            — same
#   VITE_VAPID_PUBLIC_KEY             — same (used for web push; unused on iOS
#                                       but read at boot, so non-empty)
#   VITE_NOTES_RECOVERY_PUBLIC_KEY    — same
#   VITE_SENTRY_DSN                   — same
#   VITE_TURNSTILE_SITE_KEY           — same
#   VITE_STRIPE_PUBLISHABLE_KEY       — same
#   VITE_STRIPE_PRICE_ID              — same
#   VITE_STRIPE_PRICE_ID_ANNUAL       — same
#
# Until every required secret is present, the workflow exits early
# with a clear "missing secret X" message rather than failing partway.

name: iOS Build & TestFlight

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'android/**'
      # Serverless functions are Vercel-only and never part of the iOS web
      # bundle (vite builds src/ → dist/), so api/ changes must not burn an
      # iOS build — Apple's daily TestFlight upload cap is the constraint.
      - 'api/**'
      # Likewise the database layer (migrations, schema.sql, the drift
      # snapshot) is never bundled into the app — never trigger a build.
      - 'supabase/**'
      - 'scripts/**'
      # apply-ios-config.sh IS in scripts/ but is on the iOS critical
      # path — changes to it (entitlements, signing-pbxproj patch,
      # marketing version, etc.) MUST trigger a new build. Re-include
      # via the negation prefix.
      - '!scripts/apply-ios-config.sh'
      # Same story for the widget-extension target script — it shapes
      # the generated Xcode project, so it's on the iOS critical path.
      - '!scripts/add-widget-target.rb'
      # ...and the build-time provisioning-profile fetcher.
      - '!scripts/fetch-asc-profiles.mjs'
      - '.github/**'
      - '!.github/workflows/ios-build.yml'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why are you triggering manually? (logged in run name)'
        required: false
        default: 'manual'

concurrency:
  # One iOS build at a time. Pushes during a build cancel the older.
  group: ios-build
  cancel-in-progress: true

jobs:
  build:
    name: Archive + upload to TestFlight
    # macos-26 ships with Xcode 26 (iOS 26 SDK). Apple's App Store
    # rejected the iOS 18.5 SDK artifacts produced by macos-15 in
    # June 2026 with "all iOS apps must be built with the iOS 26
    # SDK or later". Pin explicitly rather than relying on
    # macos-latest's image-rollout cadence.
    runs-on: macos-26
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify secrets present
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ASC_ISSUER: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER }}
          ASC_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          missing=()
          [ -z "$APPLE_TEAM_ID" ] && missing+=("APPLE_TEAM_ID")
          [ -z "$ASC_KEY_ID" ]    && missing+=("APP_STORE_CONNECT_API_KEY_ID")
          [ -z "$ASC_ISSUER" ]    && missing+=("APP_STORE_CONNECT_API_KEY_ISSUER")
          [ -z "$ASC_KEY" ]       && missing+=("APP_STORE_CONNECT_API_KEY_BASE64")
          [ -z "$SUPABASE_URL" ]  && missing+=("VITE_SUPABASE_URL")
          [ -z "$SUPABASE_KEY" ]  && missing+=("VITE_SUPABASE_ANON_KEY")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            echo "Add them at Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web bundle
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY }}
          VITE_NOTES_RECOVERY_PUBLIC_KEY: ${{ secrets.VITE_NOTES_RECOVERY_PUBLIC_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_TURNSTILE_SITE_KEY: ${{ secrets.VITE_TURNSTILE_SITE_KEY }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}
          VITE_STRIPE_PRICE_ID: ${{ secrets.VITE_STRIPE_PRICE_ID }}
          VITE_STRIPE_PRICE_ID_ANNUAL: ${{ secrets.VITE_STRIPE_PRICE_ID_ANNUAL }}
          VITE_WHATSAPP_UI_ENABLED: ${{ vars.VITE_WHATSAPP_UI_ENABLED }}
          # Native auth features. These are gated by the same VITE flags as
          # web, but the iOS build runs HERE (not on Vercel), so it never
          # sees Vercel's env. Hard-enabled because the backend is fully
          # configured (Supabase Google provider + passkey RP) and these
          # are first-class native flows: Sign in with Google
          # (@capgo/capacitor-social-login) and passkeys (@capgo shim →
          # ASAuthorization). To kill either on native, set to "false" here
          # and let a new build ship.
          VITE_GOOGLE_OAUTH_ENABLED: "true"
          VITE_PASSKEYS_UI_ENABLED: "true"
        run: npm run build

      - name: Generate iOS project (cap add ios + sync)
        run: |
          npx cap add ios
          npx cap sync ios

      - name: Generate app icons + splash from assets/
        # @capacitor/assets reads assets/icon.png (1024×1024) and
        # assets/splash.png (2732×2732), writes every iOS variant into
        # ios/App/App/Assets.xcassets/. Without this, every TestFlight
        # build ships Capacitor's placeholder blue-X icon.
        # --splashBackgroundColor pins the LaunchScreen storyboard's
        # surrounding canvas to the exact Cardigan teal so the seam
        # between the scaleAspectFit splash image and the surrounding
        # storyboard background disappears (matches the splash plugin
        # backgroundColor configured in capacitor.config.json).
        run: npx @capacitor/assets generate --ios --splashBackgroundColor "#5B9BAF" --splashBackgroundColorDark "#5B9BAF"

      - name: Install xcodeproj gem (widget target creation)
        # scripts/add-widget-target.rb (invoked by apply-ios-config.sh)
        # builds the CardiganWidgets app-extension target with the
        # xcodeproj gem. Pinned to the 1.x line we validated against.
        run: sudo gem install xcodeproj -v '~> 1.27' --no-document

      # Decode the ASC API key early — both the marketing-version resolver
      # (next) and the TestFlight upload (later) read it off disk. Moved
      # ahead of the entitlements step so the resolver can call the ASC API.
      - name: Decode App Store Connect API key
        env:
          ASC_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        run: |
          mkdir -p ~/private_keys
          echo "$ASC_KEY_BASE64" | base64 --decode > "$HOME/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          chmod 600 "$HOME/private_keys/AuthKey_${ASC_KEY_ID}.p8"

      # Auto-resolve the marketing version (CFBundleShortVersionString) from
      # App Store Connect so it NEVER needs a manual bump. Apple closes a
      # version "train" once a build on it is released and rejects further
      # uploads (90062/90186 — the recurring failure this eliminates).
      # resolve-ios-version.mjs bumps past the highest RELEASED version and
      # otherwise reuses the current open draft, so the version advances
      # exactly once per App Store release with no human involvement.
      #
      # Precedence: the repo variable IOS_MARKETING_VERSION (manual escape
      # hatch) wins; then the ASC-derived value; then FALLBACK_VERSION.
      # Fail-open — any resolver error degrades to the fallback and the
      # build still proceeds (never blocks). Result is exported via
      # $GITHUB_ENV so apply-ios-config.sh picks it up.
      - name: Resolve iOS marketing version
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ASC_ISSUER: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER }}
          OVERRIDE: ${{ vars.IOS_MARKETING_VERSION }}
          FALLBACK_VERSION: '20.7'
        run: |
          set +e
          if [ -n "$OVERRIDE" ]; then
            echo "Marketing version: repo-variable override IOS_MARKETING_VERSION=$OVERRIDE"
            echo "MARKETING_VERSION=$OVERRIDE" >> "$GITHUB_ENV"
            exit 0
          fi
          RESOLVED=$(ASC_KEY_PATH="$HOME/private_keys/AuthKey_${ASC_KEY_ID}.p8" \
            FALLBACK_VERSION="$FALLBACK_VERSION" \
            node scripts/resolve-ios-version.mjs)
          RC=$?
          if [ $RC -ne 0 ] || [ -z "$RESOLVED" ]; then
            echo "::warning title=iOS version auto-resolve fell back::Could not derive the marketing version from App Store Connect (rc=$RC); using FALLBACK $FALLBACK_VERSION. If TestFlight then rejects with 90062/90186, set the repo variable IOS_MARKETING_VERSION. See CLAUDE.md → build-failure triage."
            RESOLVED="$FALLBACK_VERSION"
          fi
          echo "Marketing version (auto-resolved): $RESOLVED"
          echo "MARKETING_VERSION=$RESOLVED" >> "$GITHUB_ENV"

      - name: Layer entitlements + Privacy Manifest
        env:
          # Used by the pbxproj patch inside apply-ios-config.sh to set
          # DEVELOPMENT_TEAM on the App target's Release config —
          # because passing it as an xcodebuild CLI arg leaks to
          # SPM dependency targets that don't support signing.
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # MARKETING_VERSION is injected into the job env by the
          # "Resolve iOS marketing version" step above (override →
          # ASC auto-resolve → fallback); apply-ios-config.sh reads it.
        run: bash scripts/apply-ios-config.sh

      # Capacitor 8 ships with Swift Package Manager by default — no
      # Podfile, no xcworkspace. xcodebuild resolves SPM deps itself
      # at -project parse time, so no separate install step is needed.

      # Manual signing setup — the App Store Connect API key we have is
      # App-Manager-scoped, so xcodebuild's -allowProvisioningUpdates with
      # Automatic signing only created Development certs (and Development
      # profiles need registered devices we don't have). The Distribution
      # cert lives in a repo secret; the provisioning profiles are fetched
      # FRESH from the ASC API below (always current — capability changes
      # invalidate profiles, and a stale copy in a secret is exactly how a
      # build breaks a month later).
      - name: Install distribution certificate
        env:
          P12_BASE64: ${{ secrets.BUILD_CERTIFICATE_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.BUILD_CERTIFICATE_P12_PASSWORD }}
        run: |
          # Decode artifacts
          CERT_PATH="$RUNNER_TEMP/build_certificate.p12"
          echo "$P12_BASE64" | base64 --decode > "$CERT_PATH"

          # Create + unlock a temporary keychain. Default-keychain switch
          # so codesign reaches into it without needing extra flags.
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PW=$(openssl rand -base64 24)
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN_PATH"

          # Import the P12; -A lets any app on the runner read the key
          # (codesign + xcodebuild). Authorize partition access so
          # codesign doesn't prompt for the keychain password.
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PW" "$KEYCHAIN_PATH"

          # Put the build keychain first in the search list so codesign
          # finds the cert without scanning the login keychain.
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychain -d user | tr -d '"')

          # Confirm the identity is visible to codesign.
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      # Both profiles must be on disk for the archive (per-target
      # signing) AND mapped in ExportOptions (per-bundle-id) below.
      # Fetched live so a portal-side regeneration (e.g. after a
      # capability change) is picked up with zero secret churn.
      - name: Fetch provisioning profiles from App Store Connect
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ASC_ISSUER: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER }}
          PROFILE_NAMES: 'Cardigan App Store,Cardigan Widgets App Store'
        run: |
          ASC_KEY_PATH="$HOME/private_keys/AuthKey_${ASC_KEY_ID}.p8" \
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles" \
          node scripts/fetch-asc-profiles.mjs

      - name: Archive
        run: |
          cd ios/App
          # Signing settings live in the App target's Release config in
          # project.pbxproj (injected by apply-ios-config.sh). NOT
          # passed via CLI — xcodebuild CLI build settings apply to
          # every target in the project graph, and SPM dependency
          # targets (ion-ios-camera, etc.) fail when handed
          # signing-related settings they don't support:
          #   * CODE_SIGN_ENTITLEMENTS resolves against the wrong
          #     SRCROOT → "file could not be opened"
          #   * PROVISIONING_PROFILE_SPECIFIER on a static library →
          #     "X does not support provisioning profiles"
          #
          # The only CLI build setting still passed here is
          # CURRENT_PROJECT_VERSION — it's a number, applies uniformly
          # to all targets without breakage, and Apple requires it to
          # monotonically increase per TestFlight upload
          # (ENTITY_ERROR.ATTRIBUTE.INVALID.DUPLICATE otherwise).
          # github.run_number is the natural source: monotonic per
          # workflow run, trivially traceable.
          xcodebuild -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -destination "generic/platform=iOS" \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            archive

      - name: Export IPA
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd ios/App
          # Render the export options inline so we can stitch in the team
          # id + profile mapping that manual signing requires.
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store-connect</string>
            <key>signingStyle</key><string>manual</string>
            <key>teamID</key><string>$APPLE_TEAM_ID</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>mx.cardigan.app</key><string>Cardigan App Store</string>
              <key>mx.cardigan.app.widgets</key><string>Cardigan Widgets App Store</string>
            </dict>
            <key>uploadSymbols</key><true/>
            <key>stripSwiftSymbols</key><true/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -exportPath "$RUNNER_TEMP/ipa" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

      - name: Upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ASC_ISSUER: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER }}
        run: |
          IPA=$(ls "$RUNNER_TEMP"/ipa/*.ipa | head -1)
          echo "Uploading $IPA to TestFlight..."
          # Capture altool output so we can turn Apple's two recurring,
          # cryptic upload rejections into a loud, actionable ::error::.
          # The archive/export already SUCCEEDED by this point, so these
          # are never app-code bugs — they're version/quota issues that a
          # red build should self-explain. Full runbook: CLAUDE.md →
          # "build-failure triage".
          set +e
          OUT=$(xcrun altool --upload-app \
            -f "$IPA" \
            -t ios \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER" 2>&1)
          CODE=$?
          echo "$OUT"
          if [ $CODE -eq 0 ]; then
            echo "✓ Uploaded to TestFlight."
            exit 0
          fi
          if echo "$OUT" | grep -qE '90062|90186'; then
            echo "::error title=iOS marketing-version train closed::TestFlight rejected the upload: the CFBundleShortVersionString train is CLOSED (90062 'must be higher' / 90186 'train closed'). Apple locks a marketing version once a build on it ships to the App Store and refuses all later uploads to it. FIX (not an app-code change): bump the marketing version to the next value — set the repo variable IOS_MARKETING_VERSION, or edit MARKETING_VERSION in scripts/apply-ios-config.sh — then push. The archive + export SUCCEEDED; only the upload was blocked. Runbook: CLAUDE.md → build-failure triage."
          elif echo "$OUT" | grep -q '90382'; then
            echo "::error title=TestFlight daily upload cap::Upload throttled (90382 — Apple's ~24h per-app upload cap). The IPA built + signed fine; only the upload was rejected. Wait for the window to reset, then re-trigger. NOT a code failure. Runbook: CLAUDE.md → iOS builds."
          else
            echo "::error title=TestFlight upload failed::altool exited $CODE — see the output above."
          fi
          exit $CODE

      - name: Clean up API key
        if: always()
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        run: rm -f "$HOME/private_keys/AuthKey_${ASC_KEY_ID}.p8"
