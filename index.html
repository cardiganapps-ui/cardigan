<!doctype html>
<html lang="es-MX">

    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- ── SEO + social ──────────────────────────────────────────────
         Search engines and OG-link previews use these. The lang on
         <html> is es-MX (canonical product audience) so a search
         that surfaces cardigan.mx returns the right localised
         snippet. -->
    <meta name="description" content="Cardigan es la app para psicólogos, nutriólogos, entrenadores y profesores particulares en México. Lleva el control de tus pacientes, sesiones, pagos y notas — todo en un solo lugar." />
    <meta name="keywords" content="agenda psicólogos, software consultorio, control de pacientes, agenda nutriólogos, app entrenador personal, expediente clínico mexico" />
    <meta name="author" content="Cardigan" />
    <link rel="canonical" href="https://cardigan.mx/" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="es_MX" />
    <meta property="og:site_name" content="Cardigan" />
    <meta property="og:title" content="Cardigan — Tu consultorio, en un solo lugar" />
    <meta property="og:description" content="Pacientes, sesiones, pagos y notas — todo en una app diseñada para terapeutas en México." />
    <meta property="og:url" content="https://cardigan.mx/" />
    <meta property="og:image" content="https://cardigan.mx/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:alt" content="Cardigan — Tu consultorio, en un solo lugar" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Cardigan — Tu consultorio, en un solo lugar" />
    <meta name="twitter:description" content="Pacientes, sesiones, pagos y notas — todo en una app diseñada para terapeutas en México." />
    <meta name="twitter:image" content="https://cardigan.mx/og-image.png" />

    <!-- Schema.org structured data — surfaces in Google's rich results
         and lets the marketing page show up as a SoftwareApplication
         with a price. Update Offer.price when the plan changes. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Cardigan",
      "operatingSystem": "Web, iOS, Android, iPadOS",
      "applicationCategory": "BusinessApplication",
      "url": "https://cardigan.mx/",
      "image": "https://cardigan.mx/og-image.png",
      "screenshot": "https://cardigan.mx/og-image.png",
      "offers": {
        "@type": "Offer",
        "price": "149",
        "priceCurrency": "MXN",
        "category": "Subscription",
        "availability": "https://schema.org/InStock"
      },
      "description": "App para terapeutas, nutriólogos, entrenadores y profesores particulares en México. Lleva el control de pacientes, agenda, pagos y notas.",
      "inLanguage": "es-MX",
      "featureList": [
        "Agenda recurrente con extensión automática",
        "Expediente por paciente con notas, documentos y mediciones",
        "Notas cifradas de extremo a extremo",
        "Recordatorios push antes de cada sesión",
        "Sincronización con Apple Calendar y Google Calendar",
        "Cálculo automático de saldos y honorarios",
        "Cumple LFPDPPP: cifrado en reposo y en tránsito"
      ]
    }
    </script>
    <!-- WebSite + SearchAction lets Google surface a sitelinks search
         box on branded queries ("cardigan"). The handler redirects to
         the marketing search results page; the SPA itself doesn't need
         a real search endpoint, the schema just declares intent. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Cardigan",
      "alternateName": "Cardigan App",
      "url": "https://cardigan.mx/",
      "inLanguage": "es-MX",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://cardigan.mx/blog/?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Cardigan",
      "url": "https://cardigan.mx/",
      "logo": "https://cardigan.mx/icon-192.png",
      "description": "Cardigan es la app para psicólogos, nutriólogos, entrenadores y profesores particulares en México.",
      "foundingDate": "2025",
      "areaServed": { "@type": "Country", "name": "Mexico" },
      "sameAs": [
        "https://www.instagram.com/cardigan_mex/"
      ],
      "contactPoint": [
        {
          "@type": "ContactPoint",
          "email": "hola@cardigan.mx",
          "contactType": "Customer support",
          "areaServed": "MX",
          "availableLanguage": "Spanish"
        },
        {
          "@type": "ContactPoint",
          "email": "privacy@cardigan.mx",
          "contactType": "Privacy",
          "areaServed": "MX",
          "availableLanguage": "Spanish"
        }
      ]
    }
    </script>
    <!-- FAQPage schema mirrors the FAQS array in
         src/components/landing/LandingPage.jsx so Google can surface
         rich FAQ snippets directly under the cardigan.mx result.
         Profession landing pages (/psicologos/, etc.) already carry
         this; the root page was missing it. Keep these answers in
         lockstep with the JSX source — drift will confuse crawlers
         and look sloppy when both versions show up in cache. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "¿Funciona en mi celular?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sí. Cardigan está pensada para usarse desde el celular y se instala como app desde Safari o Chrome. También funciona en computadora."
          }
        },
        {
          "@type": "Question",
          "name": "¿Mis datos están seguros?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Tus notas clínicas viajan cifradas extremo a extremo — solo tú las puedes leer. Tus datos están en servidores en EE.UU. con respaldos diarios y cumplimos con LFPDPPP."
          }
        },
        {
          "@type": "Question",
          "name": "¿Puedo exportar mis pacientes?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Cuando quieras y sin pedir permiso. Descarga un JSON con todo: pacientes, sesiones, pagos y notas. Tus datos siempre son tuyos."
          }
        },
        {
          "@type": "Question",
          "name": "¿Hay contrato o permanencia?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Ningún contrato. Pagas mes a mes (o anual con descuento) y cancelas en un toque desde la app cuando ya no la necesites."
          }
        },
        {
          "@type": "Question",
          "name": "¿Tengo que enseñarle a usarla a mis pacientes?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. Cardigan es solo para ti. Tus pacientes nunca entran a la app — solo tú agendas y los recordatorios llegan al horario que elijas."
          }
        },
        {
          "@type": "Question",
          "name": "¿Y si decido cancelar?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Tu cuenta se queda intacta. Puedes seguir leyendo todo en modo lectura, exportar tus datos, y reactivar cuando quieras."
          }
        }
      ]
    }
    </script>
    <!-- Preconnect + preload Turnstile so the captcha verification on
         signin/signup feels instant. Without these, the script load
         + TLS handshake to challenges.cloudflare.com only starts when
         the user hits AuthScreen — adds ~300ms to the auth flow on
         mobile networks. Now both run in parallel with the React boot. -->
    <link rel="preconnect" href="https://challenges.cloudflare.com" crossorigin />
    <link rel="dns-prefetch" href="https://challenges.cloudflare.com" />
    <link rel="preload" as="script" href="https://challenges.cloudflare.com/turnstile/v0/api.js" crossorigin />
    <!-- iOS 18+ dark-mode home screen + iOS 18/26 tinted / Liquid Glass
         appearance. iOS picks the variant that matches the user's home-
         screen appearance; the monochrome SVG is used as a tint mask. -->
    <link rel="apple-touch-icon" href="/icon-dark.svg" media="(prefers-color-scheme: dark)" />
    <link rel="mask-icon" href="/icon-mono.svg" color="#5B9BAF" />
    <!-- Two media-scoped theme-color tags so iOS picks the correct
         OS-chrome color without JS. The inline boot script below still
         overrides when the user has chosen a non-system theme; these
         media queries cover the system-default path AND the resume-
         from-background frame (iOS doesn't re-run the boot script on
         resume, so the static meta is what the OS uses for the
         transition). The dark color matches --white in dark.css. -->
    <meta name="theme-color" content="#FFFFFF" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1A1A1A" media="(prefers-color-scheme: dark)" />
    <!-- maximum-scale=1 prevents iOS Safari from auto-zooming on input
         focus and (more importantly) failing to restore the original zoom
         level on blur. Modern iOS still honors user pinch-zoom for
         accessibility regardless of this setting. -->
    <!-- We deliberately DO NOT set interactive-widget here. Briefly
         tried `resizes-content` to push sticky-bottom sheet buttons
         above the on-screen keyboard, but that opt-in causes iOS Safari
         to re-flow the layout viewport every time the keyboard's
         autocomplete / autofill suggestion bar updates — i.e. on every
         keystroke. Net result was severe input lag in form fields
         (AuthScreen signup, IntakeFormSheet, reschedule). Reverting to
         the default `resizes-visual` keeps the layout viewport stable;
         iOS pins position:fixed elements to the *visual* viewport, so
         sticky-bottom buttons in our sheets remain reachable above the
         keyboard anyway. Don't add interactive-widget back without
         paying the input-lag cost. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Cardigan" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- Smart App Banner: shows a native "Open in App Store" strip when

    <meta name="apple-itunes-app" content="app-id=6777229934" />
    <title>Cardigan — Agenda y expediente para terapeutas, nutriólogos y entrenadores</title>

    <!-- CSP NOTE: this inline script is whitelisted by SHA-256 in
         vercel.json's `script-src`. If you edit even a single byte
         (including whitespace), the browser will block it and you'll
         see a dark-mode FOUC on first paint. Recompute the hash with:
           python3 -c "import hashlib,base64; \
             print('sha256-'+base64.b64encode(hashlib.sha256(open('/dev/stdin','rb').read()).digest()).decode())" \
             < <inline contents>
         and update vercel.json's `Content-Security-Policy` header. -->
    <script>
      (function(){try{var p=localStorage.getItem('cardigan-theme')||'system';
      var h=document.documentElement;
      var d=p==='dark'||(p==='system'&&window.matchMedia('(prefers-color-scheme: dark)').matches);
      if(d){h.setAttribute('data-theme','dark');h.style.colorScheme='dark';}
      else if(p==='light'){h.setAttribute('data-theme','light');h.style.colorScheme='light';}
      if(p!=='system'){var m=document.querySelectorAll('meta[name="theme-color"]');
      for(var i=0;i<m.length;i++){m[i].content=d?'#1A1A1A':'#FFFFFF';}}
      }catch(e){}})();
    </script>
