<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <!-- iOS 18+ dark-mode home screen + iOS 18/26 tinted / Liquid Glass
         appearance. iOS picks the variant that matches the user's home-
         screen appearance; the monochrome SVG is used as a tint mask. -->
    <link rel="apple-touch-icon" href="/icon-dark.svg" media="(prefers-color-scheme: dark)" />
    <link rel="mask-icon" href="/icon-mono.svg" color="#5B9BAF" />
    <meta name="theme-color" content="#FFFFFF" />
    <!-- maximum-scale=1 prevents iOS Safari from auto-zooming on input
         focus and (more importantly) failing to restore the original zoom
         level on blur. Modern iOS still honors user pinch-zoom for
         accessibility regardless of this setting. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Cardigan" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>cardigan</title>

    <!-- iPad splash screens (apple-touch-startup-image). Apple matches by
         exact device-width / device-height / pixel-ratio / orientation.
         Covers iPad Mini 6, iPad 10.2"/10.9", iPad Air/Pro 11", iPad Pro 12.9".
         Brand-colored static PNGs in /public/splash/. -->
    <link rel="apple-touch-startup-image" href="/splash/ipad-mini-portrait.png"
          media="(device-width: 744px) and (device-height: 1133px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/splash/ipad-mini-landscape.png"
          media="(device-width: 744px) and (device-height: 1133px) and (-webkit-device-pixel-ratio: 2) and (orientation: landscape)" />
    <link rel="apple-touch-startup-image" href="/splash/ipad-10-portrait.png"
          media="(device-width: 810px) and (device-height: 1080px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/splash/ipad-10-landscape.png"
          media="(device-width: 810px) and (device-height: 1080px) and (-webkit-device-pixel-ratio: 2) and (orientation: landscape)" />
    <link rel="apple-touch-startup-image" href="/splash/ipad-air-portrait.png"
          media="(device-width: 820px) and (device-height: 1180px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/splash/ipad-air-landscape.png"
          media="(device-width: 820px) and (device-height: 1180px) and (-webkit-device-pixel-ratio: 2) and (orientation: landscape)" />
    <link rel="apple-touch-startup-image" href="/splash/ipad-pro-11-portrait.png"
          media="(device-width: 834px) and (device-height: 1194px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/splash/ipad-pro-11-landscape.png"
          media="(device-width: 834px) and (device-height: 1194px) and (-webkit-device-pixel-ratio: 2) and (orientation: landscape)" />
    <link rel="apple-touch-startup-image" href="/splash/ipad-pro-13-portrait.png"
          media="(device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/splash/ipad-pro-13-landscape.png"
          media="(device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2) and (orientation: landscape)" />
    <!-- CSP NOTE: this inline script is whitelisted by SHA-256 in
         vercel.json's `script-src`. If you edit even a single byte
         (including whitespace), the browser will block it and you'll
         see a dark-mode FOUC on first paint. Recompute the hash with:
           python3 -c "import hashlib,base64; \
             print('sha256-'+base64.b64encode(hashlib.sha256(open('/dev/stdin','rb').read()).digest()).decode())" \
             < <inline contents>
         and update vercel.json's `Content-Security-Policy` header. -->
    <script>
      (function(){try{var p=localStorage.getItem('cardigan-theme')||'system';
      var d=p==='dark'||(p==='system'&&window.matchMedia('(prefers-color-scheme: dark)').matches);
      if(d){document.documentElement.setAttribute('data-theme','dark');
      document.querySelector('meta[name="theme-color"]').content='#1A1A1A';}
      }catch(e){}})();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
