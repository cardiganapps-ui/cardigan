<?xml version="1.0" encoding="UTF-8"?>
<!--
  Mockup 01 — Hero quote tile (Manifesto pillar)
  Format: Instagram feed 1:1, 1080x1080
  Use: opening grid tile, anchor for profile visits.

  Fonts: Nunito (headline) + Nunito Sans (wordmark). Loaded via Google Fonts
  @import for in-browser preview. Figma resolves Nunito on import if installed.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,800;0,900;1,800;1,900&amp;family=Nunito+Sans:wght@400;700&amp;display=swap');
      .display { font-family: 'Nunito', system-ui, sans-serif; }
      .body { font-family: 'Nunito Sans', system-ui, sans-serif; }
    </style>
  </defs>

  <!-- Cream background -->
  <rect width="1080" height="1080" fill="#F5F0EB"/>

  <!-- Top-left teal accent bar -->
  <rect x="100" y="100" width="120" height="6" fill="#5B9BAF"/>

  <!-- Headline, two lines, vertically centered -->
  <text x="100" y="500" class="display" font-size="160" font-weight="800" fill="#2E2E2E">
    Tu práctica,
  </text>
  <text x="100" y="680" class="display" font-size="160" font-weight="900" font-style="italic" fill="#5B9BAF">
    en orden.
  </text>

  <!-- Bottom-right wordmark + cardigan glyph -->
  <g transform="translate(780, 980)">
    <!-- Glyph (re-used from public/icon-mono.svg, scaled to ~50px tall) -->
    <svg viewBox="330 240 370 280" x="0" y="-30" width="60" height="45">
