<?xml version="1.0" encoding="UTF-8"?>
<!--
  Mockup 04 — Carousel interior slide (Educación práctica pillar)
  Format: Instagram feed 4:5 portrait, 1080x1350
  Use: slide 2 of the same educational carousel started in 03-carousel-cover.svg.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;800;900&amp;family=Nunito+Sans:wght@400;600&amp;display=swap');
      .display { font-family: 'Nunito', system-ui, sans-serif; }
      .body { font-family: 'Nunito Sans', system-ui, sans-serif; }
    </style>
  </defs>

  <!-- Cream background -->
  <rect width="1080" height="1350" fill="#F5F0EB"/>

  <!-- Oversized "01" numeral, top-left, teal-light at low opacity -->
  <text x="-40" y="500" class="display" font-size="500" font-weight="900" fill="#7AB5C7" opacity="0.55">
    01
  </text>

  <!-- Slide headline -->
  <text x="100" y="780" class="display" font-size="84" font-weight="900" fill="#2E2E2E">
    Antecedentes
  </text>
  <text x="100" y="880" class="display" font-size="84" font-weight="900" fill="#2E2E2E">
    médicos.
  </text>

  <!-- Body example -->
  <text x="100" y="980" class="body" font-size="38" font-weight="400" fill="#555">
    Alergias, medicamentos actuales,
  </text>
  <text x="100" y="1030" class="body" font-size="38" font-weight="400" fill="#555">
    tratamientos previos. Lo necesario,
  </text>
  <text x="100" y="1080" class="body" font-size="38" font-weight="400" fill="#555">
    no la novela.
  </text>

  <!-- Footer: wordmark left, slide indicator right -->
  <text x="100" y="1270" class="display" font-size="36" font-weight="800" fill="#2E2E2E">cardigan</text>
  <text x="980" y="1270" text-anchor="end" class="body" font-size="32" font-weight="600" fill="#9E9E9E">
    2 / 6
  </text>

  <!-- Subtle next-slide arrow -->
  <text x="940" y="1185" text-anchor="end" class="body" font-size="32" font-weight="600" fill="#5B9BAF">
    sigue →
  </text>
</svg>
